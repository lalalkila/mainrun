program: train.py
project: mainrun
entity: duylam-lee-the-university-of-sydney
method: bayes
metric:
  name: val_loss
  goal: minimize

early_terminate:
  type: hyperband
  min_iter: 1
  eta: 2

parameters:
  lr:
    min: 1e-4
    max: 1e-2
    distribution: log_uniform_values
  weight_decay:
    values: [0.0, 0.01, 0.1]
  dropout:
    values: [0.0, 0.1, 0.2]
  n_head:
    values: [4, 8, 16]
  n_kv_heads:
    values: [1, 2, 4, 8]
  n_layer:
    values: [4, 6, 8]
  d_model:
    values: [384, 512, 640, 768]
  qk_gain:
    values: [1.0, 2.0, 3.0, 4.0, 6.0]
  final_logit_cap:
    values: [15.0, 30.0, 50.0]
  epochs:
    value: 7

command:
  - ${env}
  - python3
  - train.py